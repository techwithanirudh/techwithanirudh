name: Update README cards

on:
  push:
    paths-ignore:
      - .github/assets/**
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card (dark)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&bg_color=00000000&title_color=ffffff&text_color=ffffff&icon_color=8b949e&border_color=30363d
          path: .github/assets/stats/dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate stats card (light)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&bg_color=00000000&title_color=0d1117&text_color=0d1117&icon_color=57606a&border_color=d0d7de
          path: .github/assets/stats/light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            .github/assets/snake/light.svg?palette=github-light
            .github/assets/snake/dark.svg?palette=github-dark

      - name: Add borders to snake SVGs
        run: |
          import os
          import re

          def add_border_to_svg(file_path, stroke_color):
            with open(file_path, 'r') as f:
              svg_content = f.read()
            
            # Extract viewBox values
            match = re.search(r'viewBox="([^"]*)"', svg_content)
            if not match:
              return
            
            vb = match.group(1)
            values = [float(x) for x in vb.strip().split()]
            min_x, min_y, width, height = values
            
            # Generate border rect
            stroke_width = 2
            svg_border = f'''<rect
              x="{min_x + stroke_width / 2}"
              y="{min_y + stroke_width / 2}"
              width="{width - stroke_width}"
              height="{height - stroke_width}"
              rx="6"
              stroke="{stroke_color}"
              stroke-width="{stroke_width}"
              fill="none"
            />'''
            
            # Append border before closing svg tag
            svg_with_border = svg_content.replace("</svg>", svg_border + "</svg>")
            
            with open(file_path, 'w') as f:
              f.write(svg_with_border)
          
          add_border_to_svg('.github/assets/snake/light.svg', '#d0d7de')
          add_border_to_svg('.github/assets/snake/dark.svg', '#30363d')
        shell: python

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/assets/
          git commit -m "chore(readme): update README cards" || exit 0
          git push
