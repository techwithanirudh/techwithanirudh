name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card (dark)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: >
            username=${{ github.repository_owner }}
            &show_icons=true
            &bg_color=00000000
            &title_color=ffffff
            &text_color=9e9e9e
            &icon_color=ffffff
            &border_color=30363d
          path: .github/assets/stats/dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate stats card (light)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: >
            username=${{ github.repository_owner }}
            &show_icons=true
            &bg_color=00000000
            &title_color=0d1117
            &text_color=555555
            &icon_color=0d1117
            &border_color=d0d7de
          path: .github/assets/stats/light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            .github/assets/snake/light.svg?color_snake=#111111&color_dots=#eeeeee,#cccccc,#aaaaaa,#888888,#666666
            .github/assets/snake/dark.svg?color_snake=#ffffff&color_dots=#161b22,#444444,#777777,#aaaaaa,#dddddd

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/assets/
          git commit -m "chore(readme): update README cards" || exit 0
          git push
