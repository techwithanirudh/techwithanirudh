name: Update README cards

on:
  push:
    paths-ignore:
      - .github/assets/**
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card (dark)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&bg_color=00000000&title_color=ffffff&text_color=ffffff&icon_color=8b949e&border_color=30363d
          path: .github/assets/stats/dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate stats card (light)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&bg_color=00000000&title_color=0d1117&text_color=0d1117&icon_color=57606a&border_color=d0d7de
          path: .github/assets/stats/light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            .github/assets/snake/light.svg?palette=github-light
            .github/assets/snake/dark.svg?palette=github-dark

      - name: Add borders to snake SVGs
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');

            function addBorderToSvg(filePath, strokeColor) {
              const svgContent = fs.readFileSync(filePath, 'utf-8');
              
              const viewBoxMatch = svgContent.match(/viewBox="([^"]*)"/)
              if (!viewBoxMatch) return;
              
              const [minX, minY, width, height] = viewBoxMatch[1].split(' ').map(Number);

              const svgBorder = `<rect
                x="${minX + 0.5}"
                y="${minY + 0.5}"
                width="${width - 1}"
                height="${height - 1}"
                rx="6"
                stroke="${strokeColor}"
                stroke-width="1"
                fill="none"
              />`;
              
              const svgWithBorder = svgContent.replace('</svg>', svgBorder + '</svg>');
              fs.writeFileSync(filePath, svgWithBorder);
            }
            
            addBorderToSvg('.github/assets/snake/light.svg', '#d0d7de');
            addBorderToSvg('.github/assets/snake/dark.svg', '#30363d');

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/assets/
          git commit -m "chore(readme): update README cards" || exit 0
          git push
