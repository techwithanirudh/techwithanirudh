<svg width="640" height="36" viewBox="0 0 640 36" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Next.js TypeScript React Node.js Tailwind Python Docker Git">
  <title>Tech stack</title>
  <defs>
    <style>
      .pill      { rx: 6; ry: 6; height: 28; y: 4; }
      .label     { font: 500 12px 'Segoe UI', Ubuntu, 'Helvetica Neue', sans-serif; dominant-baseline: middle; }

      /* dark */
      .pill      { fill: #21262d; }
      .label     { fill: #e6edf3; }
      .border    { stroke: #30363d; stroke-width: 1; fill: none; rx: 6; ry: 6; height: 28; y: 4; }

      @media (prefers-color-scheme: light) {
        .pill   { fill: #f6f8fa; }
        .label  { fill: #1f2328; }
        .border { stroke: #d0d7de; }
      }
    </style>
  </defs>

  <!-- Next.js x=0 w=69 -->
  <rect class="pill"   x="0"   width="69"/>
  <rect class="border" x="0"   width="69"/>
  <text class="label"  x="34"  y="18" text-anchor="middle">Next.js</text>

  <!-- TypeScript x=77 w=90 -->
  <rect class="pill"   x="77"  width="90"/>
  <rect class="border" x="77"  width="90"/>
  <text class="label"  x="122" y="18" text-anchor="middle">TypeScript</text>

  <!-- React x=175 w=59 -->
  <rect class="pill"   x="175" width="59"/>
  <rect class="border" x="175" width="59"/>
  <text class="label"  x="204" y="18" text-anchor="middle">React</text>

  <!-- Node.js x=242 w=69 -->
  <rect class="pill"   x="242" width="69"/>
  <rect class="border" x="242" width="69"/>
  <text class="label"  x="276" y="18" text-anchor="middle">Node.js</text>

  <!-- Tailwind x=319 w=76 -->
  <rect class="pill"   x="319" width="76"/>
  <rect class="border" x="319" width="76"/>
  <text class="label"  x="357" y="18" text-anchor="middle">Tailwind</text>

  <!-- Python x=403 w=63 -->
  <rect class="pill"   x="403" width="63"/>
  <rect class="border" x="403" width="63"/>
  <text class="label"  x="434" y="18" text-anchor="middle">Python</text>

  <!-- Docker x=474 w=63 -->
  <rect class="pill"   x="474" width="63"/>
  <rect class="border" x="474" width="63"/>
  <text class="label"  x="505" y="18" text-anchor="middle">Docker</text>

  <!-- Git x=545 w=44 -->
  <rect class="pill"   x="545" width="44"/>
  <rect class="border" x="545" width="44"/>
  <text class="label"  x="567" y="18" text-anchor="middle">Git</text>

</svg>
