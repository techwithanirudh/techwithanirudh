<svg width="900" height="200" viewBox="0 0 900 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hey, I'm Anirudh — Into Next.js and AI">
  <title>Hey, I'm Anirudh</title>
  <defs>

    <radialGradient id="bgDark" cx="50%" cy="50%" r="60%" gradientUnits="userSpaceOnUse" gradientTransform="translate(450,100)">
      <stop offset="0%"   stop-color="#0a1929"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>

    <radialGradient id="bgLight" cx="50%" cy="50%" r="60%" gradientUnits="userSpaceOnUse" gradientTransform="translate(450,100)">
      <stop offset="0%"   stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </radialGradient>

    <pattern id="dotsDark" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.1" fill="#7dd3fc" opacity="0.18"/>
    </pattern>

    <pattern id="dotsLight" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.1" fill="#3b82f6" opacity="0.13"/>
    </pattern>

    <filter id="lineGlow" x="-5%" y="-200%" width="110%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .bg-dark  { display: block; }
      .bg-light { display: none; }

      .title    { font: 700 46px 'Segoe UI', Ubuntu, 'Helvetica Neue', sans-serif; fill: #7dd3fc; }
      .subtitle { font: 400 17px 'Segoe UI', Ubuntu, 'Helvetica Neue', sans-serif; fill: #7dd3fc; opacity: 0.55; letter-spacing: 0.04em; }
      .url      { font: 400 13px 'Segoe UI', Ubuntu, monospace; fill: #7dd3fc; opacity: 0.38; }
      .bracket  { stroke: #7dd3fc; }
      .accent   { stroke: #7dd3fc; }
      .border   { stroke: #7dd3fc; stroke-opacity: 0.3; }
      .pulse-dot { fill: #7dd3fc; }

      @media (prefers-color-scheme: light) {
        .bg-dark  { display: none; }
        .bg-light { display: block; }
        .title    { fill: #1d4ed8; }
        .subtitle { fill: #2563eb; }
        .url      { fill: #3b82f6; }
        .bracket  { stroke: #3b82f6; }
        .accent   { stroke: #3b82f6; }
        .border   { stroke: #3b82f6; stroke-opacity: 0.4; }
        .pulse-dot { fill: #3b82f6; }
      }

      .title {
        opacity: 0;
        animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
      }
      .subtitle {
        opacity: 0;
        animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.35s forwards;
      }
      .url {
        opacity: 0;
        animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.55s forwards;
      }
      .bracket {
        stroke-width: 2.2;
        stroke-linecap: round;
        fill: none;
        opacity: 0;
        animation: fadeIn 1s ease 0.6s forwards;
      }
      .top-line {
        stroke-width: 1.5;
        stroke-dasharray: 820;
        stroke-dashoffset: 820;
        animation: drawLine 1.2s ease 0s forwards;
      }
      .bottom-line {
        stroke-width: 1.5;
        stroke-dasharray: 820;
        stroke-dashoffset: 820;
        animation: drawLine 1.2s ease 0.2s forwards;
      }
      .pulse-dot { animation: pulse 2.4s ease-in-out infinite; }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 0.65; }
      }
      @keyframes drawLine { to { stroke-dashoffset: 0; } }
      @keyframes pulse {
        0%,100% { opacity: 0.4; r: 3; }
        50%      { opacity: 1;   r: 4.5; }
      }
    </style>
  </defs>

  <g class="bg-dark">
    <rect width="900" height="200" rx="8" fill="url(#bgDark)"/>
    <rect width="900" height="200" rx="8" fill="url(#dotsDark)"/>
  </g>
  <g class="bg-light">
    <rect width="900" height="200" rx="8" fill="url(#bgLight)"/>
    <rect width="900" height="200" rx="8" fill="url(#dotsLight)"/>
  </g>

  <rect x="0.5" y="0.5" width="899" height="199" rx="7.5" fill="none" class="border"/>

  <line x1="40" y1="1"   x2="860" y2="1"   class="accent top-line"    filter="url(#lineGlow)"/>
  <line x1="40" y1="199" x2="860" y2="199" class="accent bottom-line" filter="url(#lineGlow)"/>

  <path d="M38 62 L20 62 L20 138 L38 138"   class="bracket"/>
  <path d="M862 62 L880 62 L880 138 L862 138" class="bracket"/>

  <circle cx="20"  cy="62"  r="3" class="pulse-dot" style="animation-delay:0s"/>
  <circle cx="20"  cy="138" r="3" class="pulse-dot" style="animation-delay:0.6s"/>
  <circle cx="880" cy="62"  r="3" class="pulse-dot" style="animation-delay:0.3s"/>
  <circle cx="880" cy="138" r="3" class="pulse-dot" style="animation-delay:0.9s"/>

  <text x="450" y="96"  text-anchor="middle" class="title">Hey, I&#39;m Anirudh</text>
  <text x="450" y="130" text-anchor="middle" class="subtitle">Into Next.js and AI</text>
  <text x="450" y="158" text-anchor="middle" class="url">techwithanirudh.com</text>
</svg>
