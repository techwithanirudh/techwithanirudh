<svg width="495" height="195" viewBox="0 0 495 195" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="techwithanirudh's GitHub Stats">
  <title>techwithanirudh's GitHub Stats</title>
  <style>
    .header { font: 600 18px "Segoe UI", Ubuntu, "Helvetica Neue", sans-serif; fill: #2aa889; animation: fadeInAnimation 0.8s ease-in-out forwards; }
    .stat { font: 600 14px "Segoe UI", Ubuntu, "Helvetica Neue", sans-serif; fill: #99d1ce; }
    .stagger { opacity: 0; animation: fadeInAnimation 0.3s ease-in-out forwards; }
    .rank-circle-rim { stroke: #2aa889; fill: none; stroke-width: 6; opacity: 0.2; }
    .rank-circle { stroke: #2aa889; stroke-dasharray: 90; stroke-dashoffset: 10; fill: none; stroke-width: 6; stroke-linecap: round; }
    @keyframes fadeInAnimation { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes rankAnimation { from { stroke-dashoffset: 90; } to { stroke-dashoffset: 10; } }
  </style>

  <!-- Card background -->
  <rect x="0.5" y="0.5" rx="4.5" height="99%" stroke="#e4dfe7" width="494" fill="#0c1014" stroke-opacity="1"/>

  <!-- Title -->
  <g transform="translate(25, 35)">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" fill="#2aa889">
      <path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"/>
    </svg>
    <text class="header" x="25" y="12.5">techwithanirudh's GitHub Stats</text>
  </g>

  <!-- Stats rows -->
  <g transform="translate(25, 55)">
    <!-- Stars -->
    <g class="stagger" style="animation-delay: 450ms">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" fill="#38a3a5" x="0" y="5">
        <path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"/>
      </svg>
      <text class="stat" x="25" y="17">Total Stars Earned:</text>
      <text class="stat" x="220" y="17" font-weight="700">will update on next run</text>
    </g>

    <!-- Commits -->
    <g class="stagger" style="animation-delay: 600ms" transform="translate(0, 30)">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" fill="#38a3a5" x="0" y="5">
        <path d="M11.93 8.5a4.002 4.002 0 0 1-7.86 0H.75a.75.75 0 0 1 0-1.5h3.32a4.002 4.002 0 0 1 7.86 0h3.32a.75.75 0 0 1 0 1.5Zm-1.43-.75a2.5 2.5 0 1 0-5 0 2.5 2.5 0 0 0 5 0Z"/>
      </svg>
      <text class="stat" x="25" y="17">Total Commits (2026):</text>
      <text class="stat" x="220" y="17" font-weight="700">will update on next run</text>
    </g>

    <!-- PRs -->
    <g class="stagger" style="animation-delay: 750ms" transform="translate(0, 60)">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" fill="#38a3a5" x="0" y="5">
        <path d="M1.5 3.25a2.25 2.25 0 1 1 3 2.122v5.256a2.251 2.251 0 1 1-1.5 0V5.372A2.25 2.25 0 0 1 1.5 3.25Zm5.677-.177L9.573.677A.25.25 0 0 1 10 .854V2.5h1A2.5 2.5 0 0 1 13.5 5v5.628a2.251 2.251 0 1 1-1.5 0V5a1 1 0 0 0-1-1h-1v1.646a.25.25 0 0 1-.427.177L7.177 3.427a.25.25 0 0 1 0-.354Z"/>
      </svg>
      <text class="stat" x="25" y="17">Total PRs:</text>
      <text class="stat" x="220" y="17" font-weight="700">will update on next run</text>
    </g>

    <!-- Issues -->
    <g class="stagger" style="animation-delay: 900ms" transform="translate(0, 90)">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" fill="#38a3a5" x="0" y="5">
        <path d="M8 9.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z"/>
        <path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0-13 0Z"/>
      </svg>
      <text class="stat" x="25" y="17">Total Issues:</text>
      <text class="stat" x="220" y="17" font-weight="700">will update on next run</text>
    </g>

    <!-- Contribs -->
    <g class="stagger" style="animation-delay: 1050ms" transform="translate(0, 120)">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" fill="#38a3a5" x="0" y="5">
        <path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8Z"/>
      </svg>
      <text class="stat" x="25" y="17">Contributed to (last year):</text>
      <text class="stat" x="220" y="17" font-weight="700">will update on next run</text>
    </g>
  </g>

  <!-- Rank circle -->
  <g transform="translate(400, 90)">
    <circle cx="32" cy="32" r="32" class="rank-circle-rim"/>
    <circle cx="32" cy="32" r="32" transform="rotate(-90, 32, 32)" class="rank-circle"/>
    <text x="32" y="26" dominant-baseline="middle" text-anchor="middle" font-size="24" font-weight="bold" fill="#2aa889">A+</text>
    <text x="32" y="46" dominant-baseline="middle" text-anchor="middle" font-size="11" fill="#99d1ce">Rank</text>
  </g>
</svg>
